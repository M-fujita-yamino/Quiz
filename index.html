<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有名人当てクイズ - プロトコル遵守版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; padding: 20px; color: #333; }
        .quiz-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .score-board { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; gap: 5px; }
        .score-item { flex: 1; }
        .score-item span { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 2px; }
        .image-container { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #ddd; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 10px; }
        .judge-group { display: none; gap: 10px; justify-content: center; width: 100%; flex-wrap: wrap; }
        button { border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #show-answer-btn { width: 90%; padding: 18px; font-size: 1.3rem; background: #3498db; color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        #hint-btn { width: 90%; padding: 10px; font-size: 1rem; background: #f39c12; color: white; }
        .btn-judge { width: 100px; padding: 15px; color: white; font-size: 1rem; }
        .btn-correct { background: #2ecc71; }
        .btn-delta { background: #f1c40f; }
        .btn-wrong { background: #e74c3c; }
        #status { color: #7f8c8d; font-size: 0.85rem; margin-bottom: 5px; height: 1.2em; }
        #result-text { font-size: 1.4rem; font-weight: bold; min-height: 2.5em; margin: 10px 0; color: #2c3e50; display: flex; align-items: center; justify-content: center; }
        #hint-text { font-size: 1.1rem; color: #e67e22; font-weight: bold; margin-bottom: 10px; height: 1.5em; }
        .history-section { max-width: 450px; margin: 30px auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; }
        .history-list { max-height: 300px; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .history-item { padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.95rem; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="score-board">
        <div class="score-item">残り<span id="remaining-count">0</span></div>
        <div class="score-item">正解<span id="correct-count" style="color: #2ecc71;">0</span></div>
        <div class="score-item">おしい<span id="delta-count" style="color: #f1c40f;">0</span></div>
        <div class="score-item">間違い<span id="wrong-count" style="color: #e74c3c;">0</span></div>
    </div>
    <h1>この人はだれ？</h1>
    <div class="image-container"><img id="celeb-img" src="" alt="画像を読み込み中..."></div>
    <div id="status">読込中...</div>
    <div id="hint-text"></div>
    <div id="result-text">準備しています...</div>
    <div class="btn-group">
        <div id="quiz-btns" class="btn-group" style="width: 100%;">
            <button id="show-answer-btn">💡 答えを見る</button>
            <button id="hint-btn">❓ ヒント（1文字目）</button>
        </div>
        <div id="judge-group" class="judge-group">
            <button class="btn-judge btn-correct" onclick="judge('correct')">正解 ⭕️</button>
            <button class="btn-judge btn-delta" onclick="judge('delta')">おしい △</button>
            <button class="btn-judge btn-wrong" onclick="judge('wrong')">間違い ❌</button>
        </div>
    </div>
</div>

<div class="history-section">
    <div style="font-weight:bold; border-bottom:1px solid #eee; margin-bottom:10px;">解答の履歴</div>
    <ul id="history-list" class="history-list"></ul>
</div>
