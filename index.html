<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有名人当てクイズ - 最終解決版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; padding: 20px; color: #333; }
        .quiz-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .score-board { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; gap: 5px; }
        .score-item { flex: 1; }
        .score-item span { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 2px; }
        .image-container { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #ddd; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 10px; }
        .judge-group { display: none; gap: 10px; justify-content: center; width: 100%; }
        button { border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #show-answer-btn { width: 90%; padding: 18px; font-size: 1.3rem; background: #3498db; color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        #hint-btn { width: 90%; padding: 10px; font-size: 1rem; background: #f39c12; color: white; }
        .btn-judge { width: 100px; padding: 15px; color: white; font-size: 1rem; }
        .btn-correct { background: #2ecc71; }
        .btn-delta { background: #f1c40f; }
        .btn-wrong { background: #e74c3c; }
        #status { color: #7f8c8d; font-size: 0.85rem; margin-bottom: 5px; height: 1.2em; }
        #result-text { font-size: 1.4rem; font-weight: bold; min-height: 2.5em; margin: 10px 0; color: #2c3e50; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        #hint-text { font-size: 1.1rem; color: #e67e22; font-weight: bold; margin-bottom: 10px; height: 1.5em; }
        .history-section { max-width: 450px; margin: 30px auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; }
        .history-list { max-height: 300px; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .history-item { padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.95rem; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="score-board">
        <div class="score-item">残り<span id="remaining-count">0</span></div>
        <div class="score-item">正解<span id="correct-count" style="color: #2ecc71;">0</span></div>
        <div class="score-item">おしい<span id="delta-count" style="color: #f1c40f;">0</span></div>
        <div class="score-item">間違い<span id="wrong-count" style="color: #e74c3c;">0</span></div>
    </div>
    <h1>この人はだれ？</h1>
    <div class="image-container"><img id="celeb-img" src="" alt="画像を読み込み中..."></div>
    <div id="status">読込中...</div>
    <div id="hint-text"></div>
    <div id="result-text">準備しています...</div>
    <div class="btn-group">
        <div id="quiz-btns" class="btn-group" style="width: 100%;">
            <button id="show-answer-btn">💡 答えを見る</button>
            <button id="hint-btn">❓ ヒント（1文字目）</button>
        </div>
        <div id="judge-group" class="judge-group">
            <button class="btn-judge btn-correct" onclick="judge('correct')">正解 ⭕️</button>
            <button class="btn-judge btn-delta" onclick="judge('delta')">おしい △</button>
            <button class="btn-judge btn-wrong" onclick="judge('wrong')">間違い ❌</button>
        </div>
    </div>
</div>

<div class="history-section">
    <div style="font-weight:bold; border-bottom:1px solid #eee; margin-bottom:10px;">解答の履歴</div>
    <ul id="history-list" class="history-list"></ul>
</div>

<script>
    // 【重要】新しくデプロイしたURLに書き換えてください
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxvWeWfVArXqsZ-eKNf5klUbpK5fX5yC6-YdStJrLEeU6qvWWTbmmaWgUOwDW9be9bF/exec';

    let originalPhotos = []; 
    let currentPool = [];    
    let currentQuiz = null;
    let correctTotal = 0, deltaTotal = 0, wrongTotal = 0;

    async function init() {
        try {
            const response = await fetch(GAS_API_URL);
            originalPhotos = await response.json();
            resetPool();
            document.getElementById('status').innerText = "準備完了！";
            nextQuiz();
        } catch (e) {
            document.getElementById('status').innerText = "読込エラー。GASのURLを確認してください。";
        }
    }

    function resetPool() {
        currentPool = [...originalPhotos];
        for (let i = currentPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentPool[i], currentPool[j]] = [currentPool[j], currentPool[i]];
        }
    }

    function nextQuiz() {
        if (currentPool.length === 0) { resetPool(); }
        currentQuiz = currentPool.pop();
        document.getElementById('quiz-btns').style.display = "flex";
        document.getElementById('judge-group').style.display = "none";
        document.getElementById('result-text').innerText = "？？？";
        document.getElementById('hint-text').innerText = "";
        
        // iPad Safariで最も安定する公式配信URL形式
        document.getElementById('celeb-img').src = "https://lh3.googleusercontent.com/d/" + currentQuiz.id;
        
        document.getElementById('status').innerText = "出題中";
        updateScore();
    }

    document.getElementById('hint-btn').onclick = () => {
        if (currentQuiz && currentQuiz.hint) {
            document.getElementById('hint-text').innerText = "ヒント：最初の文字は「 " + currentQuiz.hint + " 」";
        }
    };

    document.getElementById('show-answer-btn').onclick = () => {
        document.getElementById('result-text').innerHTML = "正解は<br>【" + currentQuiz.name + "】";
        document.getElementById('quiz-btns').style.display = "none";
        document.getElementById('judge-group').style.display = "flex";
    };

    function judge(type) {
        if (type === 'correct') correctTotal++;
        else if (type === 'delta') deltaTotal++;
        else wrongTotal++;
        addHistory(currentQuiz.name, type);
        updateScore();
        nextQuiz();
    }

    function addHistory(name, type) {
        const list = document.getElementById('history-list');
        const item = document.createElement('li');
        item.className = 'history-item';
        let color, text;
        if (type === 'correct') { color = '#2ecc71'; text = '⭕️ 正解'; }
        else if (type === 'delta') { color = '#f1c40f'; text = '△ おしい'; }
        else { color = '#e74c3c'; text = '❌ 間違い'; }
        item.innerHTML = "<span>" + name + "</span><span style='color:" + color + "'>" + text + "</span>";
        list.insertBefore(item, list.firstChild);
    }

    function updateScore() {
        document.getElementById('correct-count').innerText = correctTotal;
        document.getElementById('delta-count').innerText = deltaTotal;
        document.getElementById('wrong-count').innerText = wrongTotal;
        document.getElementById('remaining-count').innerText = currentPool.length;
    }

    init();
</script>
</body>
</html>
