<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>185名 有名人当てクイズ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; padding: 20px; color: #333; }
        .quiz-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .image-container { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #ddd; }
        img { max-width: 100%; max-height: 100%; object-fit: cover; }
        #mic-btn { width: 80%; padding: 15px; font-size: 1.1rem; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 50px; transition: background 0.2s; }
        #mic-btn:active { background: #27ae60; }
        #status { color: #95a5a6; font-size: 0.85rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <h1>この人はだれ？</h1>
    <div class="image-container"><img id="celeb-img" src="" alt="有名人の画像"></div>
    <div id="status">読込中...</div>
    <div id="result-text">ボタンを長押しして答えてね</div>
    <button id="mic-btn">🎙 長押しして回答する</button>
</div>

<script>
    // GASのウェブアプリURL（確認済み）
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwKYIbD1UOAtkHjopsXc3RlTdvG2qV829x_9FpP1j8h-1SHUUKgYH06FRb-e5znYQ7f7g/exec';

    let folderPhotos = [];
    let currentQuiz = null;

    // 音声認識の設定
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';

    // 初期化：GASから185名分のリストを取得
    async function init() {
        try {
            const response = await fetch(GAS_API_URL);
            folderPhotos = await response.json();
            document.getElementById('status').innerText = folderPhotos.length + "名のデータを読込完了！";
            nextQuiz();
        } catch (e) {
            document.getElementById('status').innerText = "読込エラー。GASのURLを確認してください。";
            console.error(e);
        }
    }

    // 次の問題を表示する
    function nextQuiz() {
        if (folderPhotos.length === 0) return;
        const randomIndex = Math.floor(Math.random() * folderPhotos.length);
        currentQuiz = folderPhotos[randomIndex];
        
        // 【修正ポイント】Googleドライブの制限を回避しやすいURL形式
        document.getElementById('celeb-img').src = `https://lh3.googleusercontent.com/d/${currentQuiz.id}`;
        
        document.getElementById('result-text').innerText = "ボタンを長押しして答えてね";
        document.getElementById('result-text').style.color = "#333";
    }

    // マイク操作のイベント
    const startMic = (e) => {
        if (e.cancelable) e.preventDefault();
        try {
            recognition.start();
            document.getElementById('status').innerText = "聴いています...";
        } catch(err) {}
    };

    const stopMic = () => {
        setTimeout(() => {
            recognition.stop();
            document.getElementById('status').innerText = "判定中...";
        }, 500);
    };

    const micBtn = document.getElementById('mic-btn');
    micBtn.onmousedown = startMic; 
    micBtn.onmouseup = stopMic;
    micBtn.ontouchstart = startMic; 
    micBtn.ontouchend = stopMic;

    // 音声認識の結果判定
    recognition.onresult = (event) => {
        const voiceResult = event.results[0][0].transcript;
        const isCorrect = currentQuiz.keywords.some(k => voiceResult.includes(k));
        const resText = document.getElementById('result-text');
        resText.innerText = "あなたの回答: " + voiceResult;
        
        if (isCorrect) {
            resText.style.color = "#27ae60";
            resText.innerHTML += "<br>🎉 正解です！";
            setTimeout(nextQuiz, 2000);
        } else {
            resText.style.color = "#e74c3c";
            resText.innerHTML += "<br>❌ 残念！もう一度！";
        }
    };

    // 起動
    init();
</script>
</body>
</html>
